<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinity Connect</title>
    <script>
      // Глобальный перехват ошибок: если UI упал до/вне React ErrorBoundary,
      // показываем ошибку прямо на странице (иначе — пустой фон без диагностики).
      window.addEventListener("error", function (e) {
        showFatal(e.message + "\n" + (e.filename || "") + ":" + (e.lineno || ""));
      });
      window.addEventListener("unhandledrejection", function (e) {
        var r = e.reason;
        showFatal("Promise: " + (r && r.message ? r.message : String(r)));
      });
      function showFatal(msg) {
        try {
          var el = document.getElementById("fatal-error");
          if (!el) {
            el = document.createElement("pre");
            el.id = "fatal-error";
            el.style.cssText =
              "position:fixed;inset:auto 12px 12px 12px;z-index:99999;background:#2a0f1f;color:#ff8a9a;" +
              "border:1px solid #ff5a6e;border-radius:10px;padding:10px 12px;font:12px Consolas,monospace;" +
              "white-space:pre-wrap;max-height:40vh;overflow:auto;";
            document.body.appendChild(el);
          }
          el.textContent += msg + "\n";
        } catch (_) {}
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
