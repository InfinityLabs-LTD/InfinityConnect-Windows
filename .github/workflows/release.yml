name: Release

# Сборка и публикация подписанного релиза при пуше тега vX.Y.Z.
# Требует секретов репозитория:
#   TAURI_SIGNING_PRIVATE_KEY          — содержимое приватного ключа подписи
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — пароль этого ключа
# (GITHUB_TOKEN выдаётся Actions автоматически — для публикации релиза.)

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write # публикация релиза + загрузка артефактов

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Fetch sidecar binaries (xray/hysteria/sing-box/wintun/geo)
        run: powershell -ExecutionPolicy Bypass -File scripts/fetch-binaries.ps1

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "InfinityConnect ${{ github.ref_name }}"
          releaseBody: "Автосборка. Обновление через приложение (О приложении → Обновление)."
          releaseDraft: false
          prerelease: false
          # tauri-action соберёт NSIS/MSI + подписи + latest.json и зальёт в релиз.
