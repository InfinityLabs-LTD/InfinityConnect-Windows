name: Release

# Сборка и публикация подписанного релиза при пуше тега vX.Y.Z.
# Требует секретов репозитория:
#   TAURI_SIGNING_PRIVATE_KEY          — содержимое приватного ключа подписи
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — пароль этого ключа
# (GITHUB_TOKEN выдаётся Actions автоматически — для публикации релиза.)

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write # публикация релиза + загрузка артефактов

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Fetch sidecar binaries (xray/hysteria/sing-box/wintun/geo)
        run: powershell -ExecutionPolicy Bypass -File scripts/fetch-binaries.ps1

      # Release notes = сообщение аннотированного тега (что нового пишешь при git tag -a).
      # Оно же попадёт в latest.json → покажется в баннере обновления у пользователей.
      - name: Extract release notes from tag
        id: notes
        shell: bash
        run: |
          NOTES=$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}")
          if [ -z "$NOTES" ]; then NOTES="Обновление InfinityConnect ${GITHUB_REF_NAME}."; fi
          # Многострочный вывод в GITHUB_OUTPUT.
          {
            echo "body<<EOF_NOTES"
            echo "$NOTES"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Authenticode подпись установщика самоподписанным сертом «Infinity Labs»
          # (задаёт издателя; SmartScreen без реального CA всё равно предупредит).
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "InfinityConnect ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          # tauri-action соберёт NSIS/MSI + подписи + latest.json и зальёт в релиз.
          # releaseBody попадёт в latest.json → баннер обновления покажет «Что нового».

      # ── Кастомный установщик-bootstrapper (Discord-стиль) ──
      # Основное приложение уже собрано выше (target/release/infinity-connect.exe).
      # Собираем payload из его выхлопа, затем сам установщик, подписываем и
      # добавляем в тот же релиз отдельным ассетом.
      - name: Собрать payload установщика
        run: powershell -ExecutionPolicy Bypass -File installer/scripts/build-payload.ps1

      - name: Установить зависимости установщика
        working-directory: installer
        run: npm ci

      - name: Собрать установщик (bootstrapper)
        working-directory: installer
        run: npm run tauri build -- --no-bundle

      - name: Подписать и переименовать установщик
        shell: pwsh
        env:
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $exe = "installer/src-tauri/target/release/infinity-setup.exe"
          if (-not (Test-Path $exe)) { throw "Установщик не собрался: $exe" }
          # Подпись «Infinity Labs» тем же скриптом, что и остальные артефакты.
          powershell -ExecutionPolicy Bypass -File scripts/sign.ps1 -Path $exe
          $ver = "${{ github.ref_name }}".TrimStart("v")
          $out = "InfinityConnect-Setup-$ver.exe"
          Copy-Item $exe $out -Force
          echo "SETUP_ASSET=$out" >> $env:GITHUB_ENV

      - name: Добавить установщик в релиз
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" "$env:SETUP_ASSET" --clobber
